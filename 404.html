<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Lucia Novelli</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#141414">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.svg">
  <link rel="stylesheet" href="/style.css">
  <style>
    .not-found { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:4rem 2rem; background:var(--ink); color:var(--paper); }
    .not-found .eyebrow { font-size:0.72rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--gold); margin-bottom:1.5rem; }
    .not-found .big { font-family:'Playfair Display',serif; font-weight:300; font-style:italic; font-size:clamp(6rem,18vw,14rem); line-height:1; opacity:.08; margin-bottom:0; }
    .not-found h1 { font-family:'Playfair Display',serif; font-weight:300; font-style:italic; font-size:clamp(1.5rem,4vw,2.5rem); margin-top:-1rem; margin-bottom:1.5rem; }
    .not-found p { color:rgba(255,255,255,.55); max-width:38ch; margin-bottom:3rem; }
  </style>
</head>
<body>
<div class="not-found">
  <p class="eyebrow">Error 404</p>
  <p class="big" aria-hidden="true">404</p>
  <h1>Page not found</h1>
  <p>The page you're looking for seems to have wandered off. Let's get you back to the gallery.</p>
  <a href="/" class="btn btn--fill">Back to Home</a>
</div>
<script src="/main.js" defer></script>
</body>
</html>
